name: Build Windows Installer

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

jobs:
  build-installer:
    # Optional: skip draft PRs until they are marked ready
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: windows-latest

    steps:
      - name: Checkout PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Show checked out commit
        run: git rev-parse HEAD

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache node_modules and native builds
        uses: actions/cache@v4
        id: cache-deps
        with:
          path: |
            node_modules
            .vite
            **/node_modules
            **/*.node
            **/build/Release
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/binding.gyp', '**/node_modules/**/*.node') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci

      - name: Make Windows installer
        run: npm run make -- --platform win32
        env:
          POSTHOG_KEY: ${{ secrets.POSTHOG_KEY }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: irdashies-windows-installer-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: out/make/squirrel.windows/**/*.exe
          if-no-files-found: error
          retention-days: 14
